<?xml version="1.0" encoding="UTF-8"?>
<svg width="360" height="430" viewBox="0 0 360 430" fill="none" xmlns="http://www.w3.org/2000/svg">

    <!-- Sombra -->
    <defs>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.15"/>
        </filter>

        <!-- Bordes redondeados para la imagen -->
        <clipPath id="imageClip">
            <rect x="0" y="0" width="360" height="190" rx="18"/>
        </clipPath>
    </defs>

    <!-- Tarjeta -->
    <rect
        x="10"
        y="10"
        width="340"
        height="410"
        rx="18"
        fill="white"
        filter="url(#shadow)"/>

    <!-- Imagen -->
    <image
        href="assets/screenshots/football.png"
        x="10"
        y="10"
        width="340"
        height="190"
        clip-path="url(#imageClip)"
        preserveAspectRatio="xMidYMid slice"/>

    <!-- Título -->
    <text
        x="30"
        y="235"
        font-family="Segoe UI, Arial"
        font-size="24"
        font-weight="700"
        fill="#11195E">
        Football Minigame
    </text>

    <!-- Descripción -->
    <text
        x="30"
        y="265"
        font-family="Segoe UI, Arial"
        font-size="15"
        fill="#555555">

        <tspan x="30" dy="0">
            I developed game mechanics,
        </tspan>

        <tspan x="30" dy="22">
            allowing the player take control of a ball
        </tspan>

        <tspan x="30" dy="22">
            and push away the enemies from his goal
        </tspan>

    </text>

    <!-- Etiquetas -->

    <rect x="30" y="335" width="58" height="28" rx="14" fill="#E8EEFF"/>
    <text x="59" y="353" text-anchor="middle"
          font-family="Segoe UI"
          font-size="13"
          font-weight="600"
          fill="#11195E">
        Unity
    </text>

    <rect x="98" y="335" width="42" height="28" rx="14" fill="#E8EEFF"/>
    <text x="119" y="353" text-anchor="middle"
          font-family="Segoe UI"
          font-size="13"
          font-weight="600"
          fill="#11195E">
        C#
    </text>

    <!-- Botón -->

    <a href="https://cischristian.itch.io/juegodelapelota" target="_blank">
    <rect
        x="30"
        y="380"
        width="300"
        height="32"
        rx="16"
        fill="#11195E"/>

    <text
        x="180"
        y="401"
        text-anchor="middle"
        font-family="Segoe UI"
        font-size="15"
        font-weight="600"
        fill="white">
        
        View Project →

    </text>
    </a>

</svg>
